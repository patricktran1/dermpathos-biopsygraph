name: CI

on:
  push:
    branches:
      - main
      - feature/abridge-anthropic-ehr-stack
  pull_request:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install dependencies
        run: npm install --no-audit --no-fund

      - name: Build and regenerate route tree
        run: npm run build

      - name: Typecheck generated application
        shell: bash
        run: |
          set -o pipefail
          npx tsc --noEmit 2>&1 | tee tsc.log

      - name: Reject previous hackathon stack references
        shell: bash
        run: |
          pattern='Butterbase|butterbase|Neo4j|neo4j|RocketRide|rocketride|Daytona|daytona|Cognee|cognee'
          if grep -R -n -E "$pattern" src package.json README.md > legacy-stack.log; then
            cat legacy-stack.log
            echo "Previous hackathon stack references are not allowed in the event build."
            exit 1
          fi
          : > legacy-stack.log
          echo "Legacy stack audit passed."

      - name: Upload diagnostics
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: build-diagnostics
          path: |
            tsc.log
            legacy-stack.log
          if-no-files-found: error
