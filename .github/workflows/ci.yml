name: CI

on:
  push:
    branches:
      - main
      - feature/closed-care-loop
  pull_request:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install dependencies
        run: npm install --no-audit --no-fund

      - name: Build and regenerate route tree
        run: npm run build

      - name: Typecheck generated application
        shell: bash
        run: |
          set -o pipefail
          npx tsc --noEmit 2>&1 | tee tsc.log

      - name: Upload TypeScript diagnostics
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: typescript-diagnostics
          path: tsc.log
          if-no-files-found: error
