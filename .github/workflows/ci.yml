name: CI

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: dermpathos-ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  validate:
    runs-on: ubuntu-latest
    timeout-minutes: 18

    steps:
      - name: Check out repository
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          persist-credentials: false

      - name: Set up Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Clean dependency install
        run: npm ci --no-audit --no-fund

      - name: Capture high-severity dependency audit
        id: audit
        shell: bash
        run: |
          set +e
          npm audit --audit-level=high --json > npm-audit.json
          exit_code=$?
          echo "exit_code=${exit_code}" >> "$GITHUB_OUTPUT"
          exit 0

      - name: Upload dependency audit
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: dermpathos-npm-audit
          path: npm-audit.json
          if-no-files-found: error
          retention-days: 14

      - name: Enforce dependency audit
        if: steps.audit.outputs.exit_code != '0'
        run: exit 1

      - name: Lint
        run: npm run lint

      - name: Clinical regression tests
        run: npm test

      - name: Enforced clinical logic coverage
        shell: bash
        run: |
          set -o pipefail
          npm run test:coverage | tee coverage.txt

      - name: TypeScript validation
        run: npm run check

      - name: Production build
        run: npm run build

      - name: Upload coverage summary
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: clinical-test-coverage
          path: coverage.txt
          if-no-files-found: error
          retention-days: 14

  closed-loop-browser:
    needs: validate
    runs-on: ubuntu-latest
    timeout-minutes: 18

    steps:
      - name: Check out repository
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          persist-credentials: false

      - name: Set up Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Clean dependency install
        run: npm ci --no-audit --no-fund

      - name: Build production application
        env:
          PLAYWRIGHT_PRODUCTION: "1"
        run: npm run build

      - name: Verify production server artifact
        run: test -f .output/server/index.mjs

      - name: Install Chromium
        run: npx playwright install --with-deps chromium

      - name: Run closed-loop follow-up flow
        run: npm run test:e2e

      - name: Upload browser evidence
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: dermpathos-playwright-report
          path: |
            playwright-report
            test-results
          if-no-files-found: ignore
          retention-days: 14
