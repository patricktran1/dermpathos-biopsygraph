name: CI

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: dermpathos-ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  validate:
    runs-on: ubuntu-latest
    timeout-minutes: 18

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: package.json

      - name: Install dependencies
        run: npm install --no-audit --no-fund

      - name: Capture high-severity dependency audit
        id: audit
        shell: bash
        run: |
          set +e
          npm audit --audit-level=high --json > npm-audit.json
          exit_code=$?
          echo "exit_code=${exit_code}" >> "$GITHUB_OUTPUT"
          exit 0

      - name: Upload dependency audit
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: dermpathos-npm-audit
          path: npm-audit.json
          if-no-files-found: error
          retention-days: 14

      - name: Enforce dependency audit
        if: steps.audit.outputs.exit_code != '0'
        run: exit 1

      - name: Lint
        run: npm run lint

      - name: Clinical regression tests
        run: npm test

      - name: Coverage baseline
        run: npm run test:coverage | tee coverage.txt

      - name: TypeScript validation
        run: npm run check

      - name: Production build
        run: npm run build

      - name: Upload coverage summary
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: clinical-test-coverage
          path: coverage.txt
          if-no-files-found: error
          retention-days: 14

  closed-loop-browser:
    needs: validate
    runs-on: ubuntu-latest
    timeout-minutes: 18

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: package.json

      - name: Install dependencies
        run: npm install --no-audit --no-fund

      - name: Build production application
        run: npm run build

      - name: Install Chromium
        run: npx playwright install --with-deps chromium

      - name: Run closed-loop follow-up flow
        run: npm run test:e2e

      - name: Upload browser evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: dermpathos-playwright-report
          path: |
            playwright-report
            test-results
          if-no-files-found: ignore
          retention-days: 14
