name: Commit verified DermPathOS lockfile

on:
  push:
    branches: [chore/supply-chain-depth]
    paths:
      - '.github/workflows/commit-lockfile.yml'

permissions:
  contents: write

concurrency:
  group: dermpathos-lockfile-commit
  cancel-in-progress: false

jobs:
  commit-lockfile:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Check out branch
        uses: actions/checkout@v4
        with:
          ref: chore/supply-chain-depth

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Generate and verify lockfile
        run: |
          npm install --no-audit --no-fund
          npm ci --no-audit --no-fund
          git diff --check

      - name: Verify scope and commit
        shell: bash
        run: |
          changed="$(git status --short)"
          test "$changed" = '?? package-lock.json'
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add package-lock.json
          git commit -m 'Add reproducible DermPathOS npm lockfile'
          git push origin HEAD:chore/supply-chain-depth
