name: Commit verified DermPathOS lockfile

on:
  pull_request:
    branches: [main]
    paths:
      - '.github/workflows/commit-lockfile.yml'

permissions:
  contents: write

concurrency:
  group: dermpathos-lockfile-commit
  cancel-in-progress: false

jobs:
  commit-lockfile:
    if: github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Check out pull request head
        uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref }}

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Generate and verify lockfile
        run: |
          npm install --no-audit --no-fund
          npm ci --no-audit --no-fund
          git diff --check

      - name: Verify scope and commit
        shell: bash
        run: |
          rm -rf node_modules
          changed="$(git status --short)"
          printf '%s\n' "$changed" > lockfile-status.txt
          test "$changed" = '?? package-lock.json'
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add package-lock.json
          git commit -m 'Add reproducible DermPathOS npm lockfile'
          git push origin HEAD:${{ github.head_ref }}

      - name: Upload diagnostics
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: dermpathos-lockfile-commit-diagnostics
          path: lockfile-status.txt
          if-no-files-found: warn
          retention-days: 5
